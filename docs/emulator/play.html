<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoSprite64 Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; color: #eee; }
        #canvas { border: 2px solid #333; background: #000; image-rendering: pixelated; max-width: 100%; }
        .controls { margin-top: 8px; font-size: 11px; color: #888; text-align: center; }
        .controls kbd { background: #333; padding: 1px 5px; border-radius: 3px; font-size: 10px; }
        #start-btn { margin-top: 12px; padding: 8px 20px; font-size: 14px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #start-btn:hover { background: #45a049; }
        #status { margin-top: 8px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <canvas id="canvas" width="640" height="480"></canvas>
    <button id="start-btn">Click to Play</button>
    <div id="status"></div>
    <div class="controls">
        <kbd>Arrows</kbd> D-Pad &nbsp; <kbd>X</kbd> A &nbsp; <kbd>C</kbd> B &nbsp; <kbd>Enter</kbd> Start &nbsp; <kbd>Z</kbd> Z
    </div>

    <script>
        var romName = new URLSearchParams(window.location.search).get('rom') || 'platformer.z64';
        var startBtn = document.getElementById('start-btn');
        var statusEl = document.getElementById('status');
        var canvas = document.getElementById('canvas');

        var Module = {
            canvas: canvas,
            noInitialRun: true,
            onRuntimeInitialized: function() {
                statusEl.textContent = 'Emulator ready. Click to play.';
            }
        };

        startBtn.addEventListener('click', function() {
            startBtn.style.display = 'none';
            statusEl.textContent = 'Loading ROM...';
            loadROM('roms/' + romName);
        });

        function loadROM(url) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.responseType = 'arraybuffer';
            xhr.onload = function() {
                if (xhr.status === 200) {
                    statusEl.textContent = 'Starting...';
                    var data = new Uint8Array(xhr.response);
                    try {
                        FS.writeFile('/game.z64', data);
                        Module.ccall('loadRom', 'number', ['string'], ['/game.z64']);
                        Module.ccall('runEmulator', null, [], []);
                        statusEl.textContent = '';
                    } catch(e) {
                        statusEl.textContent = 'Error: ' + e.message;
                    }
                } else {
                    statusEl.textContent = 'ROM not found (' + xhr.status + ')';
                }
            };
            xhr.onerror = function() {
                statusEl.textContent = 'Network error loading ROM';
            };
            xhr.send();
        }
    </script>
    <script async src="n64wasm.js"></script>
</body>
</html>
