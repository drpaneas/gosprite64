<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GoSprite64 Demo - EmulatorJS Test</title>
</head>
<body style="background:#1a1a2e;display:flex;flex-direction:column;align-items:center;padding:20px;font-family:sans-serif;color:#eee;">
    <h3>GoSprite64 Demo</h3>
    <div style="width:640px;height:480px;max-width:100%;">
        <div id="game"></div>
    </div>
    <p style="font-size:12px;color:#888;margin-top:10px;">Arrow keys = D-Pad, X = A, C = B, Enter = Start</p>

    <script type="text/javascript">
        var romName = new URLSearchParams(window.location.search).get('rom') || 'platformer.z64';
        EJS_player = '#game';
        EJS_core = 'n64';
        EJS_gameUrl = 'roms/' + romName;
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        EJS_color = '#1a1a2e';
        EJS_startOnLoaded = true;
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
