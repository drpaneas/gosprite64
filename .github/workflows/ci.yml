name: CI

on:
  workflow_dispatch:

  push:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.gitignore'
      - 'n64.env'
      - 'build_examples.sh'
      - 'scripts/dev-linux-build.sh'
      - 'scripts/lib/workflow-common.sh'
      - 'scripts/test-workflow-guards.sh'
      - '.github/workflows/ci.yml'
      - 'docs/getting_started.md'

  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.gitignore'
      - 'n64.env'
      - 'build_examples.sh'
      - 'scripts/dev-linux-build.sh'
      - 'scripts/lib/workflow-common.sh'
      - 'scripts/test-workflow-guards.sh'
      - '.github/workflows/ci.yml'
      - 'docs/getting_started.md'

jobs:
  verified-linux-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run workflow guard checks
        run: bash ./scripts/test-workflow-guards.sh

      - name: Run verified Linux build
        run: |
          chmod +x ./scripts/dev-linux-build.sh
          ./scripts/dev-linux-build.sh
